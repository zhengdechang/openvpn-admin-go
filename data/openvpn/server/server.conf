port 4500
proto tcp
dev tun
ca /etc/openvpn/server/ca.crt
cert /etc/openvpn/server/server.crt
key /etc/openvpn/server/server.key
dh /etc/openvpn/server/dh.pem
server 10.8.0.0 255.255.255.0
client-config-dir /etc/openvpn/client/ccd

ifconfig-pool-persist /etc/openvpn/server/ipp.txt
push "route 10.10.100.0 255.255.255.0"
push "route 10.10.98.0 255.255.255.0"
keepalive 10 120
topology subnet
data-ciphers AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-256-CBC
auth SHA256
tls-server
tls-version-min 1.2
tls-cipher TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-128-GCM-SHA256:TLS-ECDHE-RSA-WITH-AES-128-GCM-SHA256
tls-auth /etc/openvpn/server/tls-auth.key 0
key-direction 0
user nobody
group nogroup
persist-key
persist-tun
# Management Interface for blacklist script
management 127.0.0.1 7505
script-security 2
client-connect /etc/openvpn/server/auth-client-connect.sh
setenv OPENVPN_BLACKLIST_FILE /etc/openvpn/server/blacklist.txt
status /etc/openvpn/status.log
status-version 2
log-append /etc/openvpn/openvpn.log
verb 3
 
