# 生产环境编排：PostgreSQL + 后端(Go API + OpenVPN) + 前端(Next.js)，三者完全分离。
# 在本目录(docker/)下启动：docker compose up -d --build
#
# 端口（host:container）：
#   前端  ${FRONTEND_PORT:-3043}:3000
#   后端  ${BACKEND_PORT:-8085}:8085
#   OpenVPN ${OPENVPN_PORT:-1194}:1194/udp
#   PostgreSQL 仅容器内部访问（不对外暴露）
services:
  postgres:
    image: postgres:16-alpine
    container_name: openvpn-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-openvpn}
      - POSTGRES_USER=${DB_USER:-openvpn}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-please-change-pass}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - openvpn-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: ${DOCKERHUB_USERNAME:-codedevin}/openvpn-admin-backend:latest
    container_name: openvpn-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GIN_MODE=release
      - TZ=${TZ:-Asia/Shanghai}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-openvpn}
      - DB_PASSWORD=${DB_PASSWORD:-please-change-pass}
      - DB_NAME=${DB_NAME:-openvpn}
      - JWT_SECRET=${JWT_SECRET:-please-change-jwt-secret}
      - OPENVPN_STATUS_LOG_PATH=/var/log/openvpn/status.log
      - WEB_PORT=8085
      # 超级管理员：仅在数据库无超管时用于创建
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
      - SUPERADMIN_NAME=${SUPERADMIN_NAME:-Super Admin}

    # OpenVPN 所需能力与设备
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    privileged: true

    ports:
      - "${BACKEND_PORT:-8085}:8085"
      - "${OPENVPN_PORT:-1194}:1194/udp"

    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./openvpn:/etc/openvpn
      - /lib/modules:/lib/modules:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - openvpn-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 前端改用 host 上的 `npm run dev`（端口 3043，支持热刷新），暂不在 docker 中运行。
  # 如需恢复 docker 内前端（生产构建），取消下方注释即可。
  # frontend:
  #   build:
  #     context: ../openvpn-web
  #     args:
  #       # Next.js 构建期固化 /api 反代目标；指向 compose 网络内的 backend 服务
  #       BACKEND_URL: http://backend:8085
  #   image: ${DOCKERHUB_USERNAME:-codedevin}/openvpn-admin-frontend:latest
  #   container_name: openvpn-frontend
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #   environment:
  #     - NODE_ENV=production
  #     - PORT=3000
  #     - HOSTNAME=0.0.0.0
  #     # 前端服务端把 /api 反代到后端（容器内服务名）
  #     - BACKEND_URL=http://backend:8085
  #   ports:
  #     - "${FRONTEND_PORT:-3043}:3000"
  #   networks:
  #     - openvpn-net
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

networks:
  openvpn-net:
    driver: bridge

# 说明：本配置使用 bridge 网络 + 端口映射，便于按需指定对外端口。
# 若生产环境的 VPN 需要直连宿主网络路由，可将 backend 改为 network_mode: host
# 并把 DB_HOST 指向 127.0.0.1（此时 mysql/frontend 亦需相应调整）。
