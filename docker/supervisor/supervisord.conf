; OpenVPN Admin 后端容器的 supervisord 主配置。
; 入口由 supervisord 托管两个程序：openvpn-server（VPN 守护进程）与 openvpn-go-api（Go API）。
; 程序定义见 /etc/supervisor/conf.d/*.conf。容器内一切以 root 运行。

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700
chown=root:root

[supervisord]
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/var/run/supervisord.pid
nodaemon=false
minfds=1024
minprocs=200
user=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
