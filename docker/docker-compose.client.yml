# OpenVPN 客户端测试容器 —— 独立于主编排，仅用于验证能否连上服务端。
#
# 复用 backend 镜像（内含 openvpn 客户端），挂载 ./client 下的配置与口令文件，
# 接入主编排创建的 docker_openvpn-net 网络，直接连容器名 openvpn-backend:1194。
# （证书用 remote-cert-tls server 校验"是服务端证书"，不校验主机名，故按容器名连接即可。）
#
# 用法（在 docker/ 目录下，主编排已 up 的前提）：
#   docker compose -f docker-compose.client.yml up        # 前台看握手日志
#   docker compose -f docker-compose.client.yml up -d     # 后台
#   docker compose -f docker-compose.client.yml logs -f   # 跟日志
#   docker compose -f docker-compose.client.yml down      # 停掉
#
# 想测公网链路：把 client/vpntest01.ovpn 的 remote 改回 61.169.28.178 1194 即可。

# 独立 project 名：避免与主编排(project=docker)共用名字，否则会误报 orphan，
# 且 --remove-orphans 会误删 backend/postgres。
name: openvpn-client

services:
  openvpn-client:
    image: ${DOCKERHUB_USERNAME:-codedevin}/openvpn-admin-backend:latest
    container_name: openvpn-client
    # 覆盖镜像默认入口（supervisord），直接跑 openvpn 客户端
    entrypoint: ["/usr/sbin/openvpn"]
    command:
      - "--config"
      - "/client/vpntest01.ovpn"
      - "--verb"
      - "3"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./client:/client:ro
    networks:
      - openvpn-net
    restart: "no"
    # 镜像自带的 healthcheck 是查 :8085/api/health，客户端容器没有 API，会误报 unhealthy → 关掉
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  openvpn-net:
    external: true
    name: docker_openvpn-net
