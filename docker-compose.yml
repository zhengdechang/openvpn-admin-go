services:
  postgres:
    image: postgres:16-alpine
    container_name: openvpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openvpn
      POSTGRES_PASSWORD: openvpn_secret
      POSTGRES_DB: openvpn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvpn -d openvpn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  openvpn-admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.combined
    container_name: openvpn-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Run web server directly — skips CLI menu, avoids concurrent migration race
    command: ["openvpn-go", "web", "--port", "8085"]

    # host network so OpenVPN TUN/routing works, and can reach postgres at 127.0.0.1:5432
    network_mode: host

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    devices:
      - /dev/net/tun:/dev/net/tun

    privileged: true

    environment:
      - GIN_MODE=release
      - TZ=Asia/Shanghai
      # postgres is exposed on host 5432 so we use 127.0.0.1 from host-network container
      - DATABASE_URL=postgres://openvpn:openvpn_secret@127.0.0.1:5432/openvpn?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-32chars!!}
      - OPENVPN_STATUS_LOG_PATH=/var/log/openvpn/status.log
      - ENABLE_WEB=true
      - WEB_PORT=8085

    volumes:
      - ./data/app:/app/data
      - ./data/logs:/app/logs
      - ./data/config:/app/config
      - ./data/openvpn:/etc/openvpn
      - /lib/modules:/lib/modules:ro

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
